<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valubre</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffffff,#f7f9fc);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
color:#111;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(0,140,255,0.08),transparent 70%);
top:-150px;
right:-120px;
filter:blur(20px);
}

body::after{
content:"";
position:absolute;
width:420px;
height:420px;
background:radial-gradient(circle,rgba(0,220,180,0.07),transparent 70%);
bottom:-140px;
left:-100px;
filter:blur(20px);
}

.container{
position:relative;
z-index:2;
text-align:center;
padding:40px;
max-width:700px;
}

.logo{
font-size:58px;
font-weight:700;
letter-spacing:-2px;
margin-bottom:18px;
background:linear-gradient(90deg,#008cff,#00c9a7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
font-size:28px;
font-weight:600;
margin-bottom:18px;
letter-spacing:-0.5px;
}

.subtext{
font-size:18px;
line-height:1.7;
color:#666;
max-width:560px;
margin:0 auto 30px;
}

.badge{
display:inline-block;
padding:10px 18px;
border:1px solid #e5e7eb;
border-radius:999px;
font-size:14px;
color:#444;
background:#fff;
box-shadow:0 8px 25px rgba(0,0,0,0.04);
margin-bottom:28px;
}

.footer{
margin-top:30px;
font-size:14px;
color:#999;
}

@media(max-width:768px){
.logo{font-size:44px;}
.tagline{font-size:22px;}
.subtext{font-size:16px;}
}
</style>
</head>
<body>

<div class="container">
<div class="badge">Currently Under Construction</div>

<div class="logo">Valubre</div>

<div class="tagline">Building Quietly. Launching Soon.</div>

<div class="subtext">
A premium digital experience is being crafted with care.<br>
We’ll be live shortly.
</div>

<div class="footer">© 2026 Valubre. All rights reserved.</div>
</div>

</body>
</html>
